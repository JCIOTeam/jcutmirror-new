# docker/nginx.conf
# Nginx 主配置文件

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /run/nginx/nginx.pid;

# Alpine nginx 模块路径
load_module /usr/lib/nginx/modules/ngx_http_fancyindex_module.so;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式 —— 给 IP 加密 hash，便于内部排查同时不直接落盘原始 IP
    # 如 GDPR/隐私要求严格，请把 $remote_addr 替换为 $http_x_forwarded_for 的脱敏哈希
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    access_log  /var/log/nginx/access.log  main buffer=64k flush=5s;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens  off;
    client_max_body_size 16m;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # ===== 压缩 =====
    # Gzip
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/wasm
        image/svg+xml
        font/woff2
        font/ttf;

    # ===== 安全头（站点级 server{} 中可补充覆盖）=====
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # 注：X-XSS-Protection 已被现代浏览器废弃且会引入新风险，已移除

    # ===== 限速：防止 /jobs 被恶意刷请求 =====
    limit_req_zone $binary_remote_addr zone=jobs:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    include /etc/nginx/conf.d/*.conf;
}
