# docker/default.conf
# Nginx 站点配置 - 包含 FancyIndex 和 API 代理

server {
    listen 80;
    listen [::]:80;
    server_name mirrors.jcut.edu.cn;

    root /usr/share/nginx/html;
    index index.html;

    # ===== API 反向代理 =====
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ===== React SPA 路由 =====
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(html)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ===== Ubuntu 镜像 FancyIndex =====
    location /ubuntu/ {
        alias /data/mirrors/ubuntu/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html" "*.tmp";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
        fancyindex_show_path on;
    }

    # ===== Debian 镜像 FancyIndex =====
    location /debian/ {
        alias /data/mirrors/debian/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
    }

    # ===== 通用镜像目录模板（其他镜像参考此格式添加）=====
    # location /archlinux/ {
    #     alias /data/mirrors/archlinux/;
    #     fancyindex on;
    #     ...
    # }

    # ===== 安全：禁止访问隐藏文件 =====
    location ~ /\. {
        deny all;
        return 404;
    }

    # ===== 错误页面 =====
    # React SPA 中已有 /403 /500 /502 /503 路由，
    # 将这些 HTTP 错误重写到 SPA 对应路径，由前端渲染友好的错误页面。
    # 注意：使用 /index.html 而非直接跳转，因为 SPA 需要 HTML shell 来加载 JS。
    error_page 403 = @error403;
    error_page 500 502 503 504 = @error5xx;
    # 404 仍然交给 React 的 * 路由处理
    error_page 404 /index.html;

    location @error403 {
        # 内部重写：在 URL 栏保留原始路径但返回 SPA，React Router 读取 /403
        rewrite ^ /index.html break;
        # 若希望用户 URL 栏显示 /403，改用下行（外部重定向）：
        # return 302 /403;
    }

    location @error5xx {
        rewrite ^ /index.html break;
        # 同上，如果想展示具体错误码 URL：
        # return 302 /500;
    }
}
