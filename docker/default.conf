# docker/default.conf
# Nginx 站点配置 - 包含 FancyIndex、直连后端 API 及校园网检测

# ── 校园网 IP 段判断（geo 模块，内网 = 1，其余 = 0）────────────────────────
# 注意：geo 指令必须在 server{} 外部的 http{} 块中定义。
# 如需修改，请将此块移至 nginx.conf 的 http{} 中或在此 include 前定义。
# 此处使用 geo 的"仅限 server 外"特性：在 vhost conf 中通过 map 判断 IPv6。

server {
    listen 80;
    listen [::]:80;
    server_name mirrors.jcut.edu.cn;

    root /usr/share/nginx/html;
    index index.html;

    # ===== 补充安全响应头（nginx.conf http{} 中已有基础安全头）=====
    # 限制浏览器功能权限
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content Security Policy
    # 注：MUI 目前依赖 unsafe-inline 注入样式，待迁移至 nonce 方案后可收紧
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # ===== 校园网检测接口 =====
    # 用 nginx 内置变量直接判断，替代原 Node.js is_campus_network 逻辑：
    #   $remote_addr 为 IPv6 → 返回 "6"
    #   $remote_addr 为私网 IP → 返回 "1"
    #   其他 → 返回 "0"
    location = /api/is_campus_network {
        set $campus_result "0";

        # IPv6 检测（地址含冒号）
        if ($remote_addr ~* ":") {
            set $campus_result "6";
        }
        # 10.0.0.0/8
        if ($remote_addr ~* "^10\.") {
            set $campus_result "1";
        }
        # 172.16.0.0/12
        if ($remote_addr ~* "^172\.(1[6-9]|2[0-9]|3[01])\.") {
            set $campus_result "1";
        }
        # 192.168.0.0/16
        if ($remote_addr ~* "^192\.168\.") {
            set $campus_result "1";
        }

        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store";
        return 200 $campus_result;
    }

    # ===== 后端原始数据接口（直连，无 Node.js 中间层）=====
    # 前端 fetchMirrors() 调用 GET /jobs，nginx 转发至后端并透传响应
    # 前端负责将 RawJob[] 转换为 Mirror[]（见 src/api/transform.ts）
    location = /jobs {
        proxy_pass         http://backend:12345/jobs;
        proxy_hide_header  X-Powered-By;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ===== nginx stub_status（供 nginx-prometheus-exporter 抓取）=====
    # 只允许内网访问，不对公网暴露
    location = /stub_status {
        stub_status on;
        allow 172.16.0.0/12;   # Docker 内网网段
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }

    # ===== Grafana 反向代理（通过 /grafana/ 子路径访问）=====
    # 访问地址：http://your-domain/grafana/
    location /grafana/ {
        proxy_pass         http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";   # 支持 WebSocket（实时刷新）
        proxy_read_timeout 60s;
    }

    # ===== React SPA 路由 =====
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(html)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ===== Ubuntu 镜像 FancyIndex =====
    location /ubuntu/ {
        alias /data/mirrors/ubuntu/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html" "*.tmp";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
        fancyindex_show_path on;
    }

    # ===== Debian 镜像 FancyIndex =====
    location /debian/ {
        alias /data/mirrors/debian/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
    }

    # ===== 通用镜像目录模板（其他镜像参考此格式添加）=====
    # location /archlinux/ {
    #     alias /data/mirrors/archlinux/;
    #     fancyindex on;
    #     ...
    # }

    # ===== 安全：禁止访问隐藏文件 =====
    location ~ /\. {
        deny all;
        return 404;
    }

    # ===== 错误页面（SPA 接管）=====
    error_page 403 =200 /index.html;
    error_page 500 502 503 504 =200 /index.html;
    error_page 404 =200 /index.html;
}
