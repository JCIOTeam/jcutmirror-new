# docker/default.conf
# Nginx 站点配置 - 包含 FancyIndex 和 API 代理

server {
    listen 80;
    listen [::]:80;
    server_name mirrors.jcut.edu.cn;

    root /usr/share/nginx/html;
    index index.html;

    # ===== API 反向代理 =====
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ===== React SPA 路由 =====
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(html)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ===== Ubuntu 镜像 FancyIndex =====
    location /ubuntu/ {
        alias /data/mirrors/ubuntu/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html" "*.tmp";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
        fancyindex_show_path on;
    }

    # ===== Debian 镜像 FancyIndex =====
    location /debian/ {
        alias /data/mirrors/debian/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
    }

    # ===== 通用镜像目录模板（其他镜像参考此格式添加）=====
    # location /archlinux/ {
    #     alias /data/mirrors/archlinux/;
    #     fancyindex on;
    #     ...
    # }

    # ===== 安全：禁止访问隐藏文件 =====
    location ~ /\. {
        deny all;
        return 404;
    }

    # ===== 错误页面 =====
    # 使用 =200 直接将 index.html 以 200 状态返回，避免命名 location + rewrite
    # 的可靠性问题。React Router 通过 window.location 读取实际路径并渲染对应页面。
    #
    # 403/5xx：直接内部返回 index.html（状态码改写为 200，SPA 正常加载）
    error_page 403 =200 /index.html;
    error_page 500 502 503 504 =200 /index.html;
    # 404：同上，交给 React 的 * 通配路由处理
    error_page 404 =200 /index.html;
}
