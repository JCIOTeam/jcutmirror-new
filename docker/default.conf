# docker/default.conf
# Nginx 站点配置 - 包含 FancyIndex 和 API 代理

server {
    listen 80;
    listen [::]:80;
    server_name mirrors.jcut.edu.cn;

    # HTTP 跳转 HTTPS（生产环境启用）
    # return 301 https://$server_name$request_uri;

    root /usr/share/nginx/html;
    index index.html;

    # ===== API 反向代理 =====
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;

        # 缓存 API 响应
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ===== React SPA 路由 =====
    location / {
        try_files $uri $uri/ /index.html;

        # 缓存控制
        location ~* \.(js|css|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(html)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ===== Ubuntu 镜像 FancyIndex =====
    location /ubuntu/ {
        alias /data/mirrors/ubuntu/;

        # FancyIndex 配置
        fancyindex on;
        fancyindex_exact_size off;        # 显示人性化文件大小
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html" "*.tmp";
        fancyindex_directories_first on;  # 目录排在文件前
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
        fancyindex_show_path on;
    }

    # ===== Debian 镜像 FancyIndex =====
    location /debian/ {
        alias /data/mirrors/debian/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
    }

    # ===== 通用镜像目录模板（其他镜像参考此格式添加）=====
    # location /archlinux/ {
    #     alias /data/mirrors/archlinux/;
    #     fancyindex on;
    #     fancyindex_exact_size off;
    #     fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
    #     fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
    #     fancyindex_directories_first on;
    #     fancyindex_time_format "%Y-%m-%d %H:%M";
    #     fancyindex_name_length 256;
    #     fancyindex_css_href /fancyindex.css;
    # }

    # ===== 安全：禁止访问隐藏文件 =====
    location ~ /\. {
        deny all;
        return 404;
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

