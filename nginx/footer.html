</div><!-- /.content-wrapper — opened in header.html -->

<!-- ── 页脚 ── -->
<footer style="border-top:1px solid var(--border);background:var(--bg-primary);padding:20px;margin-top:auto;">
  <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <span style="font-size:.82rem;color:var(--text-secondary);">© 2026 JCUT Mirror · 荆楚理工学院开源镜像站</span>
    <span style="font-size:.78rem;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;">Powered by tunasync &amp; Nginx FancyIndex</span>
  </div>
</footer>

<script>
// ── 文件类型图标（注入到 #list 每行的文件名链接前）────────────────────────────
// SVG 字符串按类型分组，颜色使用 CSS 变量近似值
const ICONS = {
  parent: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;vertical-align:-2px"><path d="M15 18l-6-6 6-6"/></svg>`,
  folder: `<svg width="15" height="15" viewBox="0 0 24 24" fill="#FCD34D" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;vertical-align:-2px"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`,
  image:  `<svg width="15" height="15" viewBox="0 0 24 24" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5" style="flex-shrink:0;vertical-align:-2px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  archive:`<svg width="15" height="15" viewBox="0 0 24 24" fill="#FDE68A" stroke="#B45309" stroke-width="1.5" style="flex-shrink:0;vertical-align:-2px"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`,
  iso:    `<svg width="15" height="15" viewBox="0 0 24 24" fill="#BFDBFE" stroke="#1D4ED8" stroke-width="1.5" style="flex-shrink:0;vertical-align:-2px"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>`,
  code:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" style="flex-shrink:0;vertical-align:-2px"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  text:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="1.5" style="flex-shrink:0;vertical-align:-2px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
  video:  `<svg width="15" height="15" viewBox="0 0 24 24" fill="#FECACA" stroke="#DC2626" stroke-width="1.5" style="flex-shrink:0;vertical-align:-2px"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`,
  rpm:    `<svg width="15" height="15" viewBox="0 0 24 24" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" style="flex-shrink:0;vertical-align:-2px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
  deb:    `<svg width="15" height="15" viewBox="0 0 24 24" fill="#FCE7F3" stroke="#BE185D" stroke-width="1.5" style="flex-shrink:0;vertical-align:-2px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
  file:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5" style="flex-shrink:0;vertical-align:-2px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
};

function getIcon(name, isParent) {
  if (isParent) return ICONS.parent;
  const lower = name.toLowerCase().replace(/\/$/, '');
  // 目录
  if (name.endsWith('/')) return ICONS.folder;
  const ext = lower.split('.').pop();
  if (['jpg','jpeg','png','gif','webp','svg','bmp','ico','avif'].includes(ext)) return ICONS.image;
  if (['iso','img'].includes(ext)) return ICONS.iso;
  if (['tar','gz','bz2','xz','zst','zip','7z','rar','tgz','txz'].includes(ext)) return ICONS.archive;
  if (['deb'].includes(ext)) return ICONS.deb;
  if (['rpm'].includes(ext)) return ICONS.rpm;
  if (['mp4','mkv','avi','mov','wmv','flv','webm'].includes(ext)) return ICONS.video;
  if (['sh','py','js','ts','c','cpp','h','go','rs','java','php','rb','pl','lua','yaml','yml','json','toml','conf','cfg','ini','xml','html','css'].includes(ext)) return ICONS.code;
  if (['txt','md','rst','log','csv','readme','license','changelog','authors','notice'].includes(ext) || name.match(/^(README|LICENSE|CHANGELOG|AUTHORS|NOTICE)$/i)) return ICONS.text;
  return ICONS.file;
}

function injectIcons() {
  const rows = document.querySelectorAll('#list tbody tr');
  rows.forEach(function(row) {
    const link = row.querySelector('td:first-child a');
    if (!link) return;
    const name = link.textContent.trim();
    const isParent = row.classList.contains('parent') || name === 'Parent directory/';
    const icon = getIcon(name, isParent);
    // 插入图标到链接文字最前面
    link.insertAdjacentHTML('afterbegin', icon + ' ');
  });
}

// 等 DOM 完全加载后执行（fancyindex 在 footer 注入，此时表格已就位）
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', injectIcons);
} else {
  injectIcons();
}
</script>
</body>
