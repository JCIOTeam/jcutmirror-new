<!-- FancyIndex footer.html -->
<!-- 注意：此文件插入在文件列表表格之后 -->

<style>
  /* ===== 页脚样式 ===== */
  .site-footer {
    background: var(--bg-primary);
    border-top: 1px solid var(--border);
    margin-top: 32px;
    padding: 32px 0 20px;
  }

  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 32px;
    margin-bottom: 24px;
  }

  /* 页脚 Logo */
  .footer-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
  }

  .footer-logo-icon {
    width: 20px;
    height: 20px;
    color: var(--accent);
  }

  .footer-logo-text {
    font-family: "JetBrains Mono", monospace;
    font-weight: 800;
    font-size: 0.9rem;
    color: var(--text-primary);
  }

  .footer-logo-text span { color: var(--accent); }

  .footer-desc {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 14px;
  }

  /* 社交图标 */
  .footer-socials {
    display: flex;
    gap: 6px;
  }

  .social-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .social-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  .social-btn svg { width: 15px; height: 15px; }

  /* 页脚链接组 */
  .footer-col-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  .footer-links-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .footer-links-list a {
    font-size: 0.82rem;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.15s;
  }

  .footer-links-list a:hover { color: var(--accent); }

  /* 分割线 */
  .footer-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 16px;
  }

  /* 版权栏 */
  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .footer-copyright {
    font-size: 0.78rem;
    color: var(--text-secondary);
  }

  .footer-powered {
    font-size: 0.78rem;
    color: var(--text-secondary);
    font-family: "JetBrains Mono", monospace;
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .footer-grid {
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .footer-grid > :first-child {
      grid-column: 1 / -1;
    }
  }

  @media (max-width: 480px) {
    .footer-grid {
      grid-template-columns: 1fr;
    }

    .footer-bottom {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  /* FancyIndex 底部表格间距修正 */
  .content-wrapper + * { margin-top: 0 !important; }
</style>

<!-- ===== 站点页脚 ===== -->

<script>
  // ===== 页脚初始化脚本 =====

  // 更新版权年份
  (function updateCopyright() {
    const el = document.getElementById('footer-copyright');
    if (el) {
      el.textContent = `© ${new Date().getFullYear()} JCut Mirror. All rights reserved.`;
    }
  })();

  // 页脚国际化
  const footerI18n = {
    zh: {
      desc: '由 JCut 团队维护的开源软件镜像站，为校园网用户提供快速的软件下载服务。',
      linksTitle: '友情链接',
      contactTitle: '联系我们',
    },
    en: {
      desc: 'An open source software mirror maintained by the JCut team, providing fast downloads for campus users.',
      linksTitle: 'Links',
      contactTitle: 'Contact',
    }
  };

  function applyFooterLocale() {
    const locale = localStorage.getItem('locale') || 'zh';
    const dict = footerI18n[locale] || footerI18n.zh;

    const descEl = document.querySelector('[data-i18n-desc]');
    if (descEl) descEl.textContent = dict.desc;

    const linksTitleEl = document.querySelector('[data-i18n-links-title]');
    if (linksTitleEl) linksTitleEl.textContent = dict.linksTitle;

    const contactTitleEl = document.querySelector('[data-i18n-contact-title]');
    if (contactTitleEl) contactTitleEl.textContent = dict.contactTitle;
  }

  applyFooterLocale();

  // 监听 storage 变化（与主站语言同步）
  window.addEventListener('storage', function(e) {
    if (e.key === 'locale') applyFooterLocale();
  });
</script>
