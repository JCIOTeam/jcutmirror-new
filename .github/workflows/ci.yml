name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts 阻断潜在依赖 postinstall 攻击
        run: npm ci --prefer-offline --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      # 仅检查高危和严重级别；可在 PR 阶段失败但不阻塞
      - name: npm audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build image
        run: docker build -t jcutmirror:ci .
      - name: Boot smoke test
        run: |
          docker run -d --name smoke -p 8080:80 jcutmirror:ci
          sleep 3
          curl -fsS http://127.0.0.1:8080/ -o /dev/null
          docker logs smoke
          docker stop smoke
