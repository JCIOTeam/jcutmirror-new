<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── JSON-LD 结构化数据（首页）── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "荆楚理工学院开源软件镜像站",
      "alternateName": ["JCUT Mirror", "JCUT Open Source Mirror", "荆楚理工学院镜像站"],

        "@type": "Organization",
        "name": "荆楚理工学院",
        "alternateName": "Jingchu University of Technology",
        "url": "https://www.jcut.edu.cn"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://mirrors.jcut.edu.cn/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
