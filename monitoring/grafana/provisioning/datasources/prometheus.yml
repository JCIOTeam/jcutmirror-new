# monitoring/grafana/provisioning/datasources/prometheus.yml
# Grafana 启动时自动挂载 Prometheus 数据源，无需手动配置

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'
      # 开启 Exemplar 支持（可选）
      exemplarTraceIdDestinations: []
